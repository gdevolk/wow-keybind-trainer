<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WoW Keybind Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0d;
    --bg2: #111318;
    --bg3: #181c24;
    --border: #2a3040;
    --border-bright: #3d4a60;
    --gold: #c8a84b;
    --gold-dim: #7a6330;
    --blue: #4a9eda;
    --blue-dim: #1e4a6e;
    --green: #4caf6e;
    --red: #d94f4f;
    --mage: #68ccef;
    --text: #c8d0dc;
    --text-dim: #5a6478;
    --cast-bar: #c8600a;
    --cast-bar2: #e87830;
    --hp-bar: #1e8c2a;
    --hp-bar2: #28b838;
    --mana-bar: #1a3ea8;
    --mana-bar2: #2855d8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 80%, rgba(74,158,218,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 20%, rgba(200,168,75,0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  /* ─── SCREENS ─── */
  .screen { display: none; width: 100vw; height: 100vh; }
  .screen.active { display: flex; }

  /* ─── SETUP SCREEN ─── */
  #setup {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
  }

  .logo {
    text-align: center;
  }

  .logo h1 {
    font-family: 'Cinzel', serif;
    font-size: 2.4rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.08em;
    text-shadow: 0 0 40px rgba(200,168,75,0.4);
  }

  .logo p {
    font-size: 0.85rem;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .binds-container {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 380px;
  }

  .bind-row {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 18px;
    transition: border-color 0.2s;
  }

  .bind-row:hover { border-color: var(--border-bright); }

  .bind-class-icon {
    width: 36px;
    height: 36px;
    border-radius: 4px;
    border: 1px solid var(--mage);
    background: linear-gradient(135deg, #0d2535, #1a4060);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    box-shadow: 0 0 8px rgba(104,204,239,0.2);
  }

  .bind-label {
    flex: 1;
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text);
  }

  .bind-label span {
    display: block;
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .bind-key {
    width: 80px;
    height: 36px;
    background: var(--bg2);
    border: 1px solid var(--border-bright);
    border-radius: 4px;
    color: var(--gold);
    font-family: 'Exo 2', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    text-align: center;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.15s;
    outline: none;
    user-select: none;
  }

  .bind-key:hover {
    border-color: var(--gold-dim);
    background: #1a1e28;
  }

  .bind-key.listening {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(200,168,75,0.08);
    animation: pulse-gold 0.8s ease-in-out infinite;
  }

  .bind-key.bound {
    border-color: var(--blue-dim);
    color: var(--blue);
  }

  @keyframes pulse-gold {
    0%, 100% { box-shadow: 0 0 0 0 rgba(200,168,75,0.4); }
    50% { box-shadow: 0 0 0 6px rgba(200,168,75,0); }
  }

  .start-btn {
    width: 380px;
    height: 48px;
    background: linear-gradient(135deg, #7a4f10, #c8820a);
    border: 1px solid var(--gold);
    border-radius: 6px;
    color: #fff;
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }

  .start-btn:hover {
    background: linear-gradient(135deg, #9a6520, #e89820);
    box-shadow: 0 0 20px rgba(200,168,75,0.3);
    transform: translateY(-1px);
  }

  .start-btn:disabled {
    background: var(--bg3);
    border-color: var(--border);
    color: var(--text-dim);
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .setup-hint {
    font-size: 0.75rem;
    color: var(--text-dim);
    text-align: center;
    letter-spacing: 0.05em;
  }

  /* ─── TRAINING SCREEN ─── */
  #training {
    position: relative;
    align-items: center;
    justify-content: center;
  }

  .arena-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 100% 60% at 50% 100%, rgba(10,20,40,0.8) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.01) 40px, rgba(255,255,255,0.01) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.01) 40px, rgba(255,255,255,0.01) 41px);
  }

  .pause-btn {
    position: absolute;
    top: 20px;
    left: 20px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text-dim);
    font-family: 'Exo 2', sans-serif;
    font-size: 0.8rem;
    padding: 8px 16px;
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.2s;
    z-index: 10;
  }

  .pause-btn:hover {
    border-color: var(--border-bright);
    color: var(--text);
  }

  /* ─── GLADIUS FRAMES ─── */
  .gladius-panel {
    position: absolute;
    right: 40px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .enemy-frame {
    width: 280px;
    background: rgba(10,12,18,0.92);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 6px;
    position: relative;
    transition: border-color 0.1s;
  }

  .enemy-frame.casting { border-color: var(--cast-bar); }
  .enemy-frame.kicked { border-color: var(--green); }
  .enemy-frame.missed { border-color: var(--red); }
  .enemy-frame.wrong-target { border-color: var(--red); }

  .frame-top {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }

  .class-icon {
    width: 32px;
    height: 32px;
    border-radius: 2px;
    border: 1px solid rgba(104,204,239,0.5);
    background: linear-gradient(135deg, #0a1e30, #142840);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    position: relative;
  }

  .class-icon::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 2px;
    box-shadow: inset 0 0 6px rgba(104,204,239,0.15);
  }

  .frame-info {
    flex: 1;
    min-width: 0;
  }

  .enemy-name {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--mage);
    letter-spacing: 0.03em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .hp-bar-wrap {
    margin-top: 3px;
    height: 10px;
    background: #0a0e14;
    border-radius: 1px;
    overflow: hidden;
    border: 1px solid rgba(0,0,0,0.4);
    position: relative;
  }

  .hp-bar-fill {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, var(--hp-bar), var(--hp-bar2));
    border-radius: 1px;
  }

  .mana-bar-wrap {
    margin-top: 2px;
    height: 5px;
    background: #0a0e14;
    border-radius: 1px;
    overflow: hidden;
    border: 1px solid rgba(0,0,0,0.4);
  }

  .mana-bar-fill {
    height: 100%;
    width: 85%;
    background: linear-gradient(90deg, var(--mana-bar), var(--mana-bar2));
    border-radius: 1px;
  }

  .bind-indicator {
    width: 32px;
    height: 32px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--text-dim);
    flex-shrink: 0;
    letter-spacing: 0.02em;
  }

  /* Cast bar */
  .cast-bar-wrap {
    height: 16px;
    background: #0a0e14;
    border-radius: 2px;
    overflow: hidden;
    border: 1px solid rgba(0,0,0,0.6);
    position: relative;
    margin-top: 4px;
  }

  .cast-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--cast-bar), var(--cast-bar2));
    border-radius: 2px;
    transition: none;
    position: relative;
  }

  .cast-bar-fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: rgba(255,200,100,0.8);
    filter: blur(2px);
  }

  .cast-bar-label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.08em;
    text-shadow: 0 1px 2px rgba(0,0,0,0.8);
    pointer-events: none;
  }

  /* Feedback flash */
  .feedback {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    opacity: 0;
    pointer-events: none;
    border-radius: 3px;
    transition: opacity 0.1s;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }

  .feedback.show { opacity: 1; }
  .feedback.kicked-fb { background: rgba(76,175,110,0.15); color: var(--green); }
  .feedback.miss-fb { background: rgba(217,79,79,0.15); color: var(--red); }
  .feedback.wrong-fb { background: rgba(217,79,79,0.15); color: var(--red); }

  /* Center area hint */
  .center-area {
    position: relative;
    z-index: 1;
    text-align: center;
    padding-right: 340px;
  }

  .spell-display {
    opacity: 0;
    transition: opacity 0.3s;
  }

  .spell-display.visible { opacity: 1; }

  .spell-icon-big {
    width: 64px;
    height: 64px;
    margin: 0 auto 12px;
    border-radius: 6px;
    border: 2px solid var(--gold-dim);
    background: linear-gradient(135deg, #1a1020, #2a1a40);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    box-shadow: 0 0 20px rgba(200,168,75,0.2);
  }

  .spell-name {
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    color: var(--gold);
    letter-spacing: 0.1em;
  }

  .casting-who {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 4px;
    letter-spacing: 0.05em;
  }

  /* ─── PAUSE OVERLAY ─── */
  #pause-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5,7,12,0.88);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  #pause-overlay.active { display: flex; }

  .pause-menu {
    background: var(--bg3);
    border: 1px solid var(--border-bright);
    border-radius: 8px;
    padding: 36px 48px;
    min-width: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .pause-title {
    font-family: 'Cinzel', serif;
    font-size: 1.4rem;
    color: var(--gold);
    letter-spacing: 0.1em;
  }

  .pause-binds {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .pause-bind-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
  }

  .pause-bind-row .bind-label { font-size: 0.85rem; }

  .pause-actions {
    display: flex;
    gap: 12px;
    width: 100%;
  }

  .btn-resume {
    flex: 1;
    height: 42px;
    background: linear-gradient(135deg, #1a4a20, #2a7a30);
    border: 1px solid #3a9a40;
    border-radius: 5px;
    color: #7fdf8f;
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-resume:hover {
    background: linear-gradient(135deg, #2a6030, #3a9a40);
    box-shadow: 0 0 12px rgba(76,175,110,0.3);
  }

  .btn-quit {
    flex: 1;
    height: 42px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text-dim);
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-quit:hover {
    border-color: var(--red);
    color: var(--red);
  }
</style>
</head>
<body>

<!-- ═══ SETUP SCREEN ═══ -->
<div id="setup" class="screen active">
  <div class="logo">
    <h1>KEYBIND TRAINER</h1>
    <p>World of Warcraft · Arena PvP</p>
  </div>

  <div class="binds-container">
    <div class="bind-row">
      <div class="bind-class-icon">🧙</div>
      <div class="bind-label">
        Kick Enemy 1
        <span>Interrupt their cast</span>
      </div>
      <button class="bind-key" id="bind-0" data-index="0">Click</button>
    </div>
    <div class="bind-row">
      <div class="bind-class-icon">🧙</div>
      <div class="bind-label">
        Kick Enemy 2
        <span>Interrupt their cast</span>
      </div>
      <button class="bind-key" id="bind-1" data-index="1">Click</button>
    </div>
    <div class="bind-row">
      <div class="bind-class-icon">🧙</div>
      <div class="bind-label">
        Kick Enemy 3
        <span>Interrupt their cast</span>
      </div>
      <button class="bind-key" id="bind-2" data-index="2">Click</button>
    </div>
  </div>

  <button class="start-btn" id="start-btn" disabled>BIND ALL KEYS TO START</button>
  <p class="setup-hint">Click a key button, then press any key on your keyboard</p>
</div>

<!-- ═══ TRAINING SCREEN ═══ -->
<div id="training" class="screen">
  <div class="arena-bg"></div>

  <button class="pause-btn" id="pause-btn">⏸ PAUSE</button>

  <!-- Center spell display -->
  <div class="center-area">
    <div class="spell-display" id="spell-display">
      <div class="spell-icon-big">🐑</div>
      <div class="spell-name">POLYMORPH</div>
      <div class="casting-who" id="casting-who">Enemy 1 is casting...</div>
    </div>
  </div>

  <!-- Gladius panel -->
  <div class="gladius-panel" id="gladius-panel">
    <!-- Enemy frames generated by JS -->
  </div>
</div>

<!-- ═══ PAUSE OVERLAY ═══ -->
<div id="pause-overlay">
  <div class="pause-menu">
    <div class="pause-title">PAUSED</div>
    <div class="pause-binds" id="pause-binds">
      <!-- rebind rows injected by JS -->
    </div>
    <div class="pause-actions">
      <button class="btn-resume" id="btn-resume">▶ RESUME</button>
      <button class="btn-quit" id="btn-quit">✕ QUIT</button>
    </div>
  </div>
</div>

<script>
const CAST_DURATION = 1500;
const POST_CAST_DELAY = 1000;
const FEEDBACK_DURATION = 600;

const state = {
  binds: [null, null, null],
  listeningIndex: null,
  paused: false,
  castingEnemy: null,   // 0-2 or null
  castTimer: null,
  castStart: null,
  animFrame: null,
  feedbackTimers: [null, null, null],
  rebindListeningIndex: null,
};

// ── SETUP ──
const bindBtns = [0,1,2].map(i => document.getElementById('bind-' + i));
const startBtn = document.getElementById('start-btn');

bindBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    const idx = parseInt(btn.dataset.index);
    // cancel any other listening
    if (state.listeningIndex !== null && state.listeningIndex !== idx) {
      bindBtns[state.listeningIndex].classList.remove('listening');
      bindBtns[state.listeningIndex].textContent =
        state.binds[state.listeningIndex] ? formatKey(state.binds[state.listeningIndex]) : 'Click';
    }
    state.listeningIndex = idx;
    btn.classList.add('listening');
    btn.classList.remove('bound');
    btn.textContent = '...';
  });
});

document.addEventListener('keydown', (e) => {
  if (state.listeningIndex !== null) {
    e.preventDefault();
    const idx = state.listeningIndex;
    state.binds[idx] = e.code;
    bindBtns[idx].textContent = formatKey(e.code);
    bindBtns[idx].classList.remove('listening');
    bindBtns[idx].classList.add('bound');
    state.listeningIndex = null;
    checkAllBound();
    return;
  }

  if (state.rebindListeningIndex !== null) {
    e.preventDefault();
    const idx = state.rebindListeningIndex;
    state.binds[idx] = e.code;
    const pbBtns = document.querySelectorAll('.pause-bind-key');
    pbBtns[idx].textContent = formatKey(e.code);
    pbBtns[idx].classList.remove('listening');
    pbBtns[idx].classList.add('bound');
    state.rebindListeningIndex = null;
    // sync setup buttons too
    bindBtns[idx].textContent = formatKey(e.code);
    return;
  }

  if (!state.paused && document.getElementById('training').classList.contains('active')) {
    handleKick(e.code);
  }
});

function formatKey(code) {
  if (!code) return '?';
  return code
    .replace('Key', '')
    .replace('Digit', '')
    .replace('Numpad', 'NP')
    .replace('Arrow', '↑'.slice(0,0))
    .replace('ArrowUp','↑')
    .replace('ArrowDown','↓')
    .replace('ArrowLeft','←')
    .replace('ArrowRight','→')
    .replace('Space','SPC')
    .replace('ShiftLeft','L-SHF')
    .replace('ShiftRight','R-SHF')
    .replace('ControlLeft','L-CTL')
    .replace('ControlRight','R-CTL')
    .replace('AltLeft','L-ALT')
    .replace('AltRight','R-ALT');
}

function checkAllBound() {
  const allBound = state.binds.every(b => b !== null);
  startBtn.disabled = !allBound;
  startBtn.textContent = allBound ? 'START TRAINING' : 'BIND ALL KEYS TO START';
}

startBtn.addEventListener('click', () => {
  if (startBtn.disabled) return;
  showScreen('training');
  buildGladiusFrames();
  scheduleNextCast(500);
});

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── GLADIUS FRAMES ──
function buildGladiusFrames() {
  const panel = document.getElementById('gladius-panel');
  panel.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    panel.innerHTML += `
      <div class="enemy-frame" id="frame-${i}">
        <div class="frame-top">
          <div class="class-icon">🧙</div>
          <div class="frame-info">
            <div class="enemy-name">Enemy ${i+1}</div>
            <div class="hp-bar-wrap"><div class="hp-bar-fill"></div></div>
            <div class="mana-bar-wrap"><div class="mana-bar-fill"></div></div>
          </div>
          <div class="bind-indicator" id="bind-ind-${i}">${formatKey(state.binds[i])}</div>
        </div>
        <div class="cast-bar-wrap" id="castbar-wrap-${i}" style="display:none;">
          <div class="cast-bar-fill" id="castbar-${i}"></div>
          <div class="cast-bar-label">Polymorph</div>
        </div>
        <div class="feedback" id="feedback-${i}"></div>
      </div>
    `;
  }
}

// ── GAME LOGIC ──
function scheduleNextCast(delay) {
  clearTimeout(state.castTimer);
  state.castTimer = setTimeout(() => {
    if (!state.paused) startCast();
  }, delay);
}

function startCast() {
  // pick random enemy
  const idx = Math.floor(Math.random() * 3);
  state.castingEnemy = idx;
  state.castStart = performance.now();

  const frame = document.getElementById('frame-' + idx);
  const castbarWrap = document.getElementById('castbar-wrap-' + idx);
  const castbar = document.getElementById('castbar-' + idx);

  frame.classList.add('casting');
  castbarWrap.style.display = 'block';
  castbar.style.width = '0%';
  castbar.style.transition = 'none';

  // show center spell display
  const spellDisplay = document.getElementById('spell-display');
  spellDisplay.classList.add('visible');
  document.getElementById('casting-who').textContent = `Enemy ${idx+1} is casting...`;

  // animate cast bar
  requestAnimationFrame(() => {
    castbar.style.transition = `width ${CAST_DURATION}ms linear`;
    castbar.style.width = '100%';
  });

  // set miss timer
  state.castTimer = setTimeout(() => {
    if (state.castingEnemy === idx) {
      onMiss(idx);
    }
  }, CAST_DURATION);

  animateCastBar(idx);
}

function animateCastBar(idx) {
  // just using CSS transition — nothing extra needed
}

function handleKick(keyCode) {
  const pressedIdx = state.binds.indexOf(keyCode);
  if (pressedIdx === -1) return; // key not bound

  if (state.castingEnemy === null) return; // nobody casting

  if (pressedIdx === state.castingEnemy) {
    onKicked(pressedIdx);
  } else {
    onWrong(pressedIdx);
  }
}

function onKicked(idx) {
  clearTimeout(state.castTimer);
  stopCastBar(idx);
  state.castingEnemy = null;
  hideCenterDisplay();

  const frame = document.getElementById('frame-' + idx);
  frame.classList.remove('casting');
  frame.classList.add('kicked');
  showFeedback(idx, 'kicked-fb', '✓ KICKED!');

  setTimeout(() => {
    frame.classList.remove('kicked');
    scheduleNextCast(POST_CAST_DELAY);
  }, FEEDBACK_DURATION);
}

function onMiss(idx) {
  stopCastBar(idx);
  state.castingEnemy = null;
  hideCenterDisplay();

  const frame = document.getElementById('frame-' + idx);
  frame.classList.remove('casting');
  frame.classList.add('missed');
  showFeedback(idx, 'miss-fb', '✗ MISS');

  setTimeout(() => {
    frame.classList.remove('missed');
    scheduleNextCast(POST_CAST_DELAY);
  }, FEEDBACK_DURATION);
}

function onWrong(idx) {
  const frame = document.getElementById('frame-' + idx);
  frame.classList.add('wrong-target');
  showFeedback(idx, 'wrong-fb', '✗ WRONG');

  setTimeout(() => {
    frame.classList.remove('wrong-target');
    clearFeedback(idx);
  }, FEEDBACK_DURATION);
}

function stopCastBar(idx) {
  const castbar = document.getElementById('castbar-' + idx);
  const castbarWrap = document.getElementById('castbar-wrap-' + idx);
  if (castbar) {
    const current = castbar.getBoundingClientRect().width /
      castbar.parentElement.getBoundingClientRect().width * 100;
    castbar.style.transition = 'none';
    castbar.style.width = current + '%';
    castbar.style.width = '0%';
    setTimeout(() => { castbarWrap.style.display = 'none'; }, 200);
  }
}

function hideCenterDisplay() {
  document.getElementById('spell-display').classList.remove('visible');
}

function showFeedback(idx, cls, text) {
  clearFeedback(idx);
  const el = document.getElementById('feedback-' + idx);
  el.className = 'feedback show ' + cls;
  el.textContent = text;
  state.feedbackTimers[idx] = setTimeout(() => clearFeedback(idx), FEEDBACK_DURATION + 200);
}

function clearFeedback(idx) {
  clearTimeout(state.feedbackTimers[idx]);
  const el = document.getElementById('feedback-' + idx);
  if (el) el.className = 'feedback';
}

// ── PAUSE ──
document.getElementById('pause-btn').addEventListener('click', openPause);
document.getElementById('btn-resume').addEventListener('click', closePause);
document.getElementById('btn-quit').addEventListener('click', () => {
  closePause();
  clearTimeout(state.castTimer);
  cancelAnimationFrame(state.animFrame);
  state.castingEnemy = null;
  showScreen('setup');
});

function openPause() {
  state.paused = true;
  clearTimeout(state.castTimer);
  // freeze cast bar
  if (state.castingEnemy !== null) {
    const castbar = document.getElementById('castbar-' + state.castingEnemy);
    if (castbar) {
      const computed = getComputedStyle(castbar).width;
      castbar.style.transition = 'none';
      castbar.style.width = computed;
    }
  }
  buildPauseBinds();
  document.getElementById('pause-overlay').classList.add('active');
}

function closePause() {
  state.paused = false;
  document.getElementById('pause-overlay').classList.add('active');
  document.getElementById('pause-overlay').classList.remove('active');
  // update bind indicators
  for (let i = 0; i < 3; i++) {
    const ind = document.getElementById('bind-ind-' + i);
    if (ind) ind.textContent = formatKey(state.binds[i]);
  }
  // resume or schedule next
  if (state.castingEnemy !== null) {
    resumeCastBar();
  } else {
    scheduleNextCast(POST_CAST_DELAY);
  }
}

function resumeCastBar() {
  // restart cast from current position
  const idx = state.castingEnemy;
  const castbar = document.getElementById('castbar-' + idx);
  const castbarWrap = document.getElementById('castbar-wrap-' + idx);
  if (!castbar) return;

  const currentWidth = parseFloat(castbar.style.width) || 0;
  const remaining = CAST_DURATION * (1 - currentWidth / 100);

  castbarWrap.style.display = 'block';
  requestAnimationFrame(() => {
    castbar.style.transition = `width ${remaining}ms linear`;
    castbar.style.width = '100%';
  });

  state.castTimer = setTimeout(() => {
    if (state.castingEnemy === idx) onMiss(idx);
  }, remaining);
}

function buildPauseBinds() {
  const container = document.getElementById('pause-binds');
  container.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    container.innerHTML += `
      <div class="pause-bind-row">
        <div class="bind-class-icon" style="width:28px;height:28px;font-size:14px;border-radius:3px;border:1px solid rgba(104,204,239,0.5);background:linear-gradient(135deg,#0d2535,#1a4060);display:flex;align-items:center;justify-content:center;flex-shrink:0;">🧙</div>
        <div class="bind-label" style="flex:1;font-size:0.85rem;">
          Kick Enemy ${i+1}
        </div>
        <button class="bind-key pause-bind-key" data-index="${i}" style="width:72px;">${formatKey(state.binds[i])}</button>
      </div>
    `;
  }
  container.querySelectorAll('.pause-bind-key').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.index);
      if (state.rebindListeningIndex !== null) {
        container.querySelectorAll('.pause-bind-key')[state.rebindListeningIndex].classList.remove('listening');
      }
      state.rebindListeningIndex = idx;
      btn.classList.add('listening');
      btn.textContent = '...';
    });
  });
}
</script>
